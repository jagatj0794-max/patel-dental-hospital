<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="crownGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="screwGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0ea5e9" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background container -->
  <circle cx="72" cy="72" r="60" fill="#f0f9ff" opacity="0.6" stroke="#e0f2fe" stroke-width="1.5" filter="url(#glow)" />
  <circle cx="72" cy="72" r="48" fill="#e0f2fe" opacity="0.3" />

  <!-- Dental Implant structure -->
  <g transform="translate(0, -2)">
    <!-- 1. Tooth Crown (Top) -->
    <path d="M44 48 C44 34, 58 34, 68 40 Q72 42, 76 40 C86 34, 100 34, 100 48 C100 62, 92 70, 84 72 H60 C52 70, 44 62, 44 48 Z" fill="url(#crownGrad)" stroke="#ffffff" stroke-width="2" />
    <!-- Crown highlight shine -->
    <path d="M50 48 Q54 40, 64 42" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6" fill="none" />

    <!-- 2. Abutment (Middle Gold Collar) -->
    <path d="M60 72 H84 L80 80 H64 Z" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />

    <!-- 3. Titanium Screw Thread Root (Bottom) -->
    <path d="M64 80 H80 L76 112 C76 114, 68 114, 68 112 Z" fill="url(#screwGrad)" stroke="#ffffff" stroke-width="1.5" />
    <!-- Screw thread ridges -->
    <rect x="61" y="86" width="22" height="4" rx="2" fill="url(#screwGrad)" stroke="#ffffff" stroke-width="1" />
    <rect x="63" y="94" width="18" height="4" rx="2" fill="url(#screwGrad)" stroke="#ffffff" stroke-width="1" />
    <rect x="65" y="102" width="14" height="4" rx="2" fill="url(#screwGrad)" stroke="#ffffff" stroke-width="1" />

    <!-- Sparkles/Medical Shines -->
    <path d="M106 34 L108 29 L113 27 L108 25 L106 20 L104 25 L99 27 L104 29 Z" fill="#fbbf24" />
  </g>
</svg>
