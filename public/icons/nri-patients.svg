<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="globeGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0ea5e9" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background container -->
  <circle cx="72" cy="72" r="60" fill="#f0f9ff" opacity="0.6" stroke="#e0f2fe" stroke-width="1.5" filter="url(#glow)" />
  <circle cx="72" cy="72" r="48" fill="#e0f2fe" opacity="0.3" />

  <!-- Global / NRI Patients Design -->
  <g transform="translate(0, -2)">
    <!-- Earth Globe Base -->
    <circle cx="72" cy="72" r="38" fill="url(#globeGrad)" />
    
    <!-- Longitudes grid lines -->
    <path d="M72 34 A 38 38 0 0 1 72 110" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <path d="M72 34 A 19 38 0 0 1 72 110" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <path d="M72 34 A 19 38 0 0 0 72 110" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    
    <!-- Latitudes grid lines -->
    <line x1="34" y1="72" x2="110" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <path d="M38 53 Q 72 61 106 53" stroke="#ffffff" stroke-width="1.5" opacity="0.3" fill="none" />
    <path d="M38 91 Q 72 83 106 91" stroke="#ffffff" stroke-width="1.5" opacity="0.3" fill="none" />

    <!-- Flight / Travel Path Arc -->
    <path d="M42 90 A 42 42 0 0 1 102 44" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4" fill="none" />
    
    <!-- Travel Plane (Clean Minimalist Vector) -->
    <path d="M96 44 L103 40 L104 43 L101 46 L104 49 L102 50 L98 46 L95 46 Z" fill="#fbbf24" />

    <!-- Golden heart overlay symbolizing global care -->
    <path d="M72 58 C72 58, 69.5 53, 64.5 53 C59.5 53, 56 56.5, 56 61.5 C56 69.5, 72 79, 72 79 C72 79, 88 69.5, 88 61.5 C88 56.5, 84.5 53, 79.5 53 C74.5 53, 72 58, 72 58 Z" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="2.5" />
    
    <!-- White medical cross inside the gold heart -->
    <path d="M69 61.5 H75 M72 58.5 V64.5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
