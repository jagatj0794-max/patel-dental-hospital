<svg width="600" height="150" viewBox="0 0 600 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Leaves Gradients -->
    <linearGradient id="leafRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="leafLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>

    <!-- Tooth Gradient -->
    <linearGradient id="toothWhite" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    
    <!-- Screw Metallic Gradient -->
    <linearGradient id="screwMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="25%" stop-color="#CBD5E1"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="70%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    
    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g transform="translate(10, 15)">
    <!-- Right Leaf Shell -->
    <path d="M 55 125 C 130 100, 150 40, 115 0 C 105 20, 90 35, 75 40 C 75 40, 95 80, 55 125 Z" fill="url(#leafRight)"/>
    
    <!-- Left Leaf Shell -->
    <path d="M 55 125 C 15 110, -5 60, 20 25 C 30 20, 45 20, 55 35 C 55 35, 20 70, 55 125 Z" fill="url(#leafLeft)"/>

    <g filter="url(#shadow)">
      <!-- Tooth Crown & Left Root -->
      <path d="M 52 28 C 30 20, 15 45, 25 70 C 35 90, 45 105, 51 125 C 53 130, 58 130, 60 125 C 60 100, 45 80, 50 68 C 55 72, 65 72, 75 68 C 90 55, 100 35, 78 28 C 70 26, 62 35, 57 35 C 52 35, 58 26, 52 28 Z" fill="url(#toothWhite)"/>
      
      <!-- Highlight -->
      <path d="M 30 40 C 35 30, 45 32, 55 35" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
      
      <!-- Screw Right Root -->
      <path d="M 55 68 L 85 64 L 75 125 C 72 130, 62 130, 58 125 Z" fill="url(#screwMetal)"/>
      
      <!-- Screw Threads -->
      <path d="M 56 75 C 65 78, 75 78, 83 73" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 56 83 C 65 86, 75 86, 81 81" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 56 91 C 65 94, 75 94, 79 89" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 57 99 C 65 102, 72 102, 77 97" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 57 107 C 62 110, 68 110, 74 105" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 58 115 C 62 117, 67 117, 72 113" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- Typography -->
  <g transform="translate(150, 85)">
    <text y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="64" letter-spacing="-1.5">
      <tspan fill="#00AEEF">Patel </tspan>
      <tspan fill="#1A2B3C">Dental</tspan>
    </text>
    
    <text x="210" y="45" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="24" fill="#4B5563" letter-spacing="6" text-anchor="middle">Hospital</text>
    
    <!-- Divider Left -->
    <line x1="0" y1="36" x2="110" y2="36" stroke="#4B5563" stroke-width="2.5"/>
    
    <!-- Divider Right -->
    <line x1="310" y1="36" x2="420" y2="36" stroke="#4B5563" stroke-width="2.5"/>
  </g>
</svg>
