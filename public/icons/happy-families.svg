<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0ea5e9" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Ambient Glow Background Circle -->
  <circle cx="72" cy="72" r="60" fill="#f0f9ff" opacity="0.6" stroke="#e0f2fe" stroke-width="1.5" filter="url(#glow)" />
  <circle cx="72" cy="72" r="48" fill="#e0f2fe" opacity="0.3" />

  <!-- Happy Family Stylized Characters -->
  <g transform="translate(0, 4)">
    <!-- Father (Left) -->
    <path d="M35 102 C35 88, 44 82, 54 82 C64 82, 73 88, 73 102" fill="url(#blueGrad)" />
    <circle cx="54" cy="62" r="13" fill="url(#blueGrad)" />

    <!-- Mother (Right) -->
    <path d="M71 102 C71 90, 79 85, 88 85 C97 85, 105 90, 105 102" fill="url(#tealGrad)" />
    <circle cx="88" cy="67" r="11.5" fill="url(#tealGrad)" />

    <!-- Child (Center) -->
    <path d="M57 102 C57 94, 63 91, 71 91 C79 91, 85 94, 85 102" fill="url(#goldGrad)" />
    <circle cx="71" cy="78" r="8" fill="url(#goldGrad)" />

    <!-- Floating Sparkles of happiness -->
    <path d="M36 46 L38 41 L43 39 L38 37 L36 32 L34 37 L29 39 L34 41 Z" fill="#fbbf24" />
    <path d="M104 50 L105.5 46.5 L109 45 L105.5 43.5 L104 40 L102.5 43.5 L99 45 L102.5 46.5 Z" fill="#14b8a6" />
    <circle cx="71" cy="36" r="3" fill="#0ea5e9" opacity="0.8" />
    <circle cx="48" cy="34" r="2" fill="#14b8a6" opacity="0.6" />
    <circle cx="92" cy="38" r="2" fill="#fbbf24" opacity="0.7" />
  </g>
</svg>
