<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#10b981" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background container -->
  <circle cx="72" cy="72" r="60" fill="#f0fdf4" opacity="0.6" stroke="#d1fae5" stroke-width="1.5" filter="url(#glow)" />
  <circle cx="72" cy="72" r="48" fill="#d1fae5" opacity="0.3" />

  <!-- Satisfied Patient Tooth + Smile Design -->
  <g transform="translate(0, -2)">
    <!-- Stylized premium tooth shape -->
    <path d="M42 50 C42 36, 60 36, 68 44 C70 46, 74 46, 76 44 C84 36, 102 36, 102 50 C102 70, 92 90, 86 100 C84 103, 80 103, 78 100 C76 98, 73 92, 72 88 C71 92, 68 98, 66 100 C64 103, 60 103, 58 100 C52 90, 42 70, 42 50 Z" fill="url(#blueGrad)" />
    
    <!-- Big bright friendly smile inside the tooth -->
    <path d="M58 64 C64 71, 80 71, 86 64" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Cheerful rosy cheeks -->
    <circle cx="53" cy="62" r="3" fill="#ffffff" opacity="0.4" />
    <circle cx="91" cy="62" r="3" fill="#ffffff" opacity="0.4" />

    <!-- Big shiny green approval check badge overlapping bottom-right -->
    <circle cx="96" cy="94" r="20" fill="url(#emeraldGrad)" stroke="#ffffff" stroke-width="3" />
    <path d="M88 94 L93 99 L104 88" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Sparkles -->
    <path d="M106 32 L108 27 L113 25 L108 23 L106 18 L104 23 L99 25 L104 27 Z" fill="#fbbf24" />
  </g>
</svg>
