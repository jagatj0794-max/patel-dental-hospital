<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="goldGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#fbbf24" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background container -->
  <circle cx="72" cy="72" r="60" fill="#fffbeb" opacity="0.6" stroke="#fef3c7" stroke-width="1.5" filter="url(#glow)" />
  <circle cx="72" cy="72" r="48" fill="#fef3c7" opacity="0.3" />

  <!-- Trophy Cup Design -->
  <g transform="translate(0, -2)">
    <!-- Laurel Wreath Leaves (Teal/Emerald) -->
    <path d="M44 86 C36 78, 36 58, 44 48 M40 76 Q34 68 38 60 M46 82 Q42 72 44 64" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <path d="M100 86 C108 78, 108 58, 100 48 M104 76 Q110 68 106 60 M98 82 Q102 72 100 64" stroke="url(#tealGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    
    <!-- Small decorative leaf details -->
    <circle cx="38" cy="50" r="3" fill="url(#tealGrad)" />
    <circle cx="106" cy="50" r="3" fill="url(#tealGrad)" />
    <circle cx="36" cy="65" r="3" fill="url(#tealGrad)" />
    <circle cx="108" cy="65" r="3" fill="url(#tealGrad)" />
    <circle cx="41" cy="80" r="3" fill="url(#tealGrad)" />
    <circle cx="103" cy="80" r="3" fill="url(#tealGrad)" />

    <!-- Gold Trophy Cup -->
    <!-- Handles -->
    <path d="M50 54 C40 54, 42 74, 52 74" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M94 54 C104 54, 102 74, 92 74" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" fill="none" />
    
    <!-- Cup Body -->
    <path d="M52 46 H92 V68 C92 78, 84 86, 72 86 C60 86, 52 78, 52 68 V46 Z" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1.5" />
    
    <!-- Cup Stem/Stand -->
    <path d="M68 86 H76 V98 H68 Z" fill="url(#goldGrad)" />
    <path d="M56 98 H88 V104 C88 106, 86 108, 84 108 H60 C58 108, 56 106, 56 104 Z" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1.5" />

    <!-- Star Emblem on Cup -->
    <path d="M72 54 L74.5 59 L80 60 L76 64 L77.5 69.5 L72 67 L66.5 69.5 L68 64 L64 60 L69.5 59 Z" fill="#ffffff" />

    <!-- Sparkles -->
    <path d="M102 36 L104 31 L109 29 L104 27 L102 22 L100 27 L95 29 L100 31 Z" fill="#fbbf24" />
    <path d="M42 40 L43.5 36.5 L47 35 L43.5 33.5 L42 30 L40.5 33.5 L37 35 L40.5 36.5 Z" fill="#14b8a6" />
  </g>
</svg>
