<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="calGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0ea5e9" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background container -->
  <circle cx="72" cy="72" r="60" fill="#f0f9ff" opacity="0.6" stroke="#e0f2fe" stroke-width="1.5" filter="url(#glow)" />
  <circle cx="72" cy="72" r="48" fill="#e0f2fe" opacity="0.3" />

  <!-- Establishment / Serving Since Design -->
  <g transform="translate(0, -2)">
    <!-- Calendar Card Base -->
    <rect x="42" y="38" width="60" height="64" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <!-- Calendar Top header (Teal/Blue) -->
    <path d="M42 48 C42 40, 42 40, 52 40 H92 C102 40, 102 40, 102 48 V54 H42 Z" fill="url(#calGrad)" />
    
    <!-- Calendar Rings/Hooks -->
    <rect x="52" y="32" width="6" height="12" rx="3" fill="#cbd5e1" stroke="#ffffff" stroke-width="1.5" />
    <rect x="86" y="32" width="6" height="12" rx="3" fill="#cbd5e1" stroke="#ffffff" stroke-width="1.5" />

    <!-- Calendar grids/lines (subtle placeholder) -->
    <line x1="50" y1="64" x2="94" y2="64" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round" />
    <line x1="50" y1="74" x2="94" y2="74" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round" />
    <line x1="50" y1="84" x2="94" y2="84" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round" />

    <!-- Big Gold Seal "EST. 2015" Badge overlapping bottom right -->
    <!-- Ribbon hanging down -->
    <path d="M84 84 L96 114 L88 108 L80 114 Z" fill="#d97706" />
    <path d="M72 84 L84 114 L76 108 L68 114 Z" fill="#b45309" />
    
    <!-- Circle Seal -->
    <circle cx="76" cy="84" r="18" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="2" />
    
    <!-- Ribbed seal edge effect -->
    <circle cx="76" cy="84" r="14" fill="none" stroke="#ffffff" stroke-dasharray="3 3" stroke-width="1.5" />

    <!-- "2015" text inside calendar center-left -->
    <text x="56" y="70" font-family="'Inter', sans-serif" font-weight="900" font-size="11" fill="#1e293b" letter-spacing="0.5">EST.</text>
    <text x="50" y="86" font-family="'Inter', sans-serif" font-weight="900" font-size="16" fill="url(#calGrad)">2015</text>
    
    <!-- Sparkles -->
    <path d="M106 32 L108 27 L113 25 L108 23 L106 18 L104 23 L99 25 L104 27 Z" fill="#fbbf24" />
  </g>
</svg>
